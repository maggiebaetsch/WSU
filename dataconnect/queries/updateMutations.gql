mutation UpdateBuilding(
  $id: UUID!,
  $name: String!
) @auth(level: NO_ACCESS) {
  building_update(
    key: { id: $id }
    data: {
      name: $name
    }
  )
}

mutation UpdateBuildingParameters(
  $id: UUID!,
  $climate: Climate!,
  $floorArea: String!,
  $buildingType: BuildingType!,
  $envelope: EnvelopeType!,
  $isAC: Boolean!
) @auth(level: NO_ACCESS) {
  buildingParameters_update(
    key: { id: $id }
    data: {
      climate: $climate
      floorArea: $floorArea
      buildingType: $buildingType
      envelope: $envelope
      isAC: $isAC
    }
  )
}

