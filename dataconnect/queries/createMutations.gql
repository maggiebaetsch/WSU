mutation CreateBuilding($name: String!) @auth(level: PUBLIC) {
  building_insert(data: { name: $name })
}

mutation CreateBuildingParameters(
  $buildingId: UUID!,
  $climate: Climate!,
  $floorArea: String!,
  $buildingType: BuildingType!,
  $envelope: EnvelopeType!,
  $isAC: Boolean!
) @auth(level: PUBLIC) {
  buildingParameters_insert(data: {
    building: { id: $buildingId }
    climate: $climate
    floorArea: $floorArea
    buildingType: $buildingType
    envelope: $envelope
    isAC: $isAC
  })
}

mutation CreateInsulationRoof(
  $buildingParametersId: UUID!,
  $type: String!,
  $thickness: Float!,
  $rValue: Float!
) @auth(level: PUBLIC) {
  insulationRoof_insert(data: {
    buildingParameters: { id: $buildingParametersId }
    type: $type
    thickness: $thickness
    rValue: $rValue
  })
}

