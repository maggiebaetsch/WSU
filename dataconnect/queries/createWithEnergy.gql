mutation CreateInsulationRoofWithEnergyResult(
  $id: UUID!,
  $buildingParametersId: UUID!,
  $type: String!,
  $thickness: Float!,
  $rValue: Float!,
  $cooling: Float!,
  $heating: Float!,
  $total: Float!,
  $carbon: Float!,
  $cost: Float!
) @auth(level: PUBLIC) {
  insulationRoof_insert(data: {
    id: $id
    buildingParameters: { id: $buildingParametersId }
    type: $type
    thickness: $thickness
    rValue: $rValue
  })
  energyResult_insert(data: {
    insulationRoof: { id: $id }
    improvementType: "INSULATION_ROOF"
    cooling: $cooling
    heating: $heating
    total: $total
    carbon: $carbon
    cost: $cost
  })
}

