query GetFullBuildingDetails($buildingId: UUID!) @auth(level: NO_ACCESS) {
  building(key: { id: $buildingId }) {
    id
    name
    buildingParameters {
      id
      climate
      floorArea
      buildingType
      envelope
      isAC
    }
  }
  insulationRoofs(where: { buildingParameters: { building: { id: { eq: $buildingId } } } }) {
    id
    type
    thickness
    rValue
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
  insulationWalls(where: { buildingParameters: { building: { id: { eq: $buildingId } } } }) {
    id
    type
    thickness
    rValue
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
  windowSizes(where: { buildingParameters: { building: { id: { eq: $buildingId } } } }) {
    id
    name
    area
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
  windowGlazings(where: { buildingParameters: { building: { id: { eq: $buildingId } } } }) {
    id
    type
    rValue
    shgc
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
  orientations(where: { buildingParameters: { building: { id: { eq: $buildingId } } } }) {
    id
    direction
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
  occupancies(where: { buildingParameters: { building: { id: { eq: $buildingId } } } }) {
    id
    numberOfPeople
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
  windowShadings(where: { buildingParameters: { building: { id: { eq: $buildingId } } } }) {
    id
    type
    isExternal
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
}
