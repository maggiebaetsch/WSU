mutation AssignInsulationRoofEnergyResult(
  $insulationRoofId: UUID!,
  $cooling: Float!,
  $heating: Float!,
  $total: Float!,
  $carbon: Float!,
  $cost: Float!
) @auth(level: NO_ACCESS) {
  energyResult_insert(data: {
    insulationRoof: { id: $insulationRoofId }
    improvementType: "INSULATION_ROOF"
    cooling: $cooling
    heating: $heating
    total: $total
    carbon: $carbon
    cost: $cost
  })
}

