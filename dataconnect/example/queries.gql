query GetAllBuildings @auth(level: NO_ACCESS) {
  buildings {
    id
    name
  }
}

query GetBuildingById($id: UUID!) @auth(level: NO_ACCESS) {
  building(key: { id: $id }) {
    id
    name
    buildingParameters {
      id
      climate
      floorArea
      buildingType
      envelope
      isAC
    }
  }
}

query GetAllBuildingParameters @auth(level: NO_ACCESS) {
  buildingParameterss {
    id
    climate
    floorArea
    buildingType
    envelope
    isAC
    building {
      id
      name
    }
  }
}

mutation CreateBuilding($name: String!) @auth(level: NO_ACCESS) {
  building_insert(data: { name: $name })
}

mutation CreateBuildingParameters(
  $buildingId: UUID!,
  $climate: Climate!,
  $floorArea: String!,
  $buildingType: BuildingType!,
  $envelope: EnvelopeType!,
  $isAC: Boolean!
) @auth(level: NO_ACCESS) {
  buildingParameters_insert(data: {
    building: { id: $buildingId }
    climate: $climate
    floorArea: $floorArea
    buildingType: $buildingType
    envelope: $envelope
    isAC: $isAC
  })
}

mutation CreateInsulationRoof(
  $buildingParametersId: UUID!,
  $type: String!,
  $thickness: Float!,
  $rValue: Float!
) @auth(level: NO_ACCESS) {
  insulationRoof_insert(data: {
    buildingParameters: { id: $buildingParametersId }
    type: $type
    thickness: $thickness
    rValue: $rValue
