query GetWindowSizes($buildingParametersId: UUID!) @auth(level: NO_ACCESS) {
  windowSizes(where: { buildingParameters: { id: { eq: $buildingParametersId } } }) {
    id
    name
    area
    energyResult {
      cooling
      heating
      total
      carbon
      cost
    }
  }
}

