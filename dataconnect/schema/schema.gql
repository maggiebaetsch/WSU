enum Climate {
  TROPICAL
  DRY_ARID_SEMIARID
  TEMPERATE
  CONTINENTAL
  POLAR_ALPINE
}

enum BuildingType {
  RESIDENTIAL
  OFFICE
  HOTEL
  GOVERNMENTAL
  SCHOOL
  HOSPITAL
  RETAIL
  AGED_CARE
  INDUSTRIAL
}

enum EnvelopeType {
  HIGH_MASS
  LOW_MASS
  GLAZED
}

type Building @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  buildingParameters: BuildingParameters
}

type BuildingParameters @table {
  building: Building!

  climate: Climate!
  floorArea: String!
  buildingType: BuildingType!
  envelope: EnvelopeType!
  isAC: Boolean!
}

type InsulationRoof @table {
  buildingParameters: BuildingParameters!
  energyResult: EnergyResult

  type: String!
  thickness: Float!
  rValue: Float!
}

type InsulationWall @table {
  buildingParameters: BuildingParameters!
  energyResult: EnergyResult

  type: String!
  thickness: Float!
  rValue: Float!
}

type WindowSize @table {
  buildingParameters: BuildingParameters!
  energyResult: EnergyResult

  area: Float!
}

type WindowGlazing @table {
  buildingParameters: BuildingParameters!
  energyResult: EnergyResult

  type: String!
  rValue: Float!
  shgc: Float!
}

type Orientation @table {
  buildingParameters: BuildingParameters!
  energyResult: EnergyResult

  direction: String!
}

type Occupancy @table {
  buildingParameters: BuildingParameters!
  energyResult: EnergyResult

  numberOfPeople: Int!
}

type WindowShading @table {
  buildingParameters: BuildingParameters!
  energyResult: EnergyResult

  type: String!
  isExternal: Boolean!
}

type EnergyResult @table {
  insulationRoof: InsulationRoof
  insulationWall: InsulationWall
  windowSize: WindowSize
  windowGlazing: WindowGlazing
  orientation: Orientation
  occupancy: Occupancy
  windowShading: WindowShading
  improvementType: String!

  cooling: Float!
  heating: Float!
  total: Float!
  carbon: Float!
  cost: Float!
}
