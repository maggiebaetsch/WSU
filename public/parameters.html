<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Building Characteristics - Building Energy Analysis</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 id="page-title">Building Characteristics</h1>
      <p id="page-subtitle">Enter your building details for energy analysis</p>
    </header>

    <div class="container">
      <form id="building-form" class="improvements-form">
        <!-- Card: Building Name -->
        <div class="card">
          <div class="form-group">
            <label for="building-name">Building Name:</label>
            <input
              type="text"
              id="building-name"
              name="buildingName"
              required
            />
          </div>
        </div>

        <!-- Card: Climate -->
        <div class="card">
          <div class="form-group">
            <label for="climate">Climate:</label>
            <select id="climate" name="climate" required>
              <option value="">Select Climate</option>
              <option value="Temperate">Temperate</option>
              <option value="Tropical">Tropical</option>
              <option value="DryAridSemiarid">Dry Arid/Semiarid</option>
              <option value="Continental">Continental</option>
              <option value="PolarAlpine">Polar/Alpine</option>
            </select>
          </div>
        </div>

        <!-- Card: Floor Area -->
        <div class="card">
          <div class="form-group">
            <label for="floor-area">Floor Area (sq ft):</label>
            <input
              type="number"
              id="floor-area"
              name="floorArea"
              min="1"
              required
            />
          </div>
        </div>

        <!-- Card: Building Type -->
        <div class="card">
          <div class="form-group">
            <label for="building-type">Building Type:</label>
            <select id="building-type" name="buildingType" required>
              <option value="">Select Building Type</option>
              <option value="Residential">Residential</option>
              <option value="Office">Office</option>
              <option value="Hotel">Hotel</option>
              <option value="Governmental">Governmental</option>
              <option value="School">School</option>
              <option value="Hospital">Hospital</option>
              <option value="Retail">Retail</option>
              <option value="AgedCare">Aged Care</option>
              <option value="Industrial">Industrial</option>
            </select>
          </div>
        </div>

        <!-- Card: Envelope -->
        <div class="card">
          <div class="form-group">
            <label for="envelope">Building Envelope:</label>
            <select id="envelope" name="envelope" required>
              <option value="">Select Envelope Type</option>
              <option value="HighMass">High Mass</option>
              <option value="LowMass">Low Mass</option>
              <option value="Glazed">Glazed</option>
            </select>
          </div>
        </div>

        <!-- Card: Air Conditioning -->
        <div class="card">
          <div class="form-group">
            <label for="air-conditioned">
              <input
                type="checkbox"
                id="air-conditioned"
                name="airConditioned"
              />
              Air Conditioned
            </label>
          </div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
          <a href="index.html" id="back-link" class="button">Back to Home</a>
          <button type="submit" id="next-button" class="button">Next ></button>
        </div>
      </form>
    </div>

    <footer>
      <p>&copy; Western Sydney University. All rights reserved.</p>
    </footer>

    <script type="module" src="./scripts/pages/parameters.js"></script>
  </body>
</html>
